<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Gauss's Law Simulator</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: #121212;
            color: #ffffff;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            touch-action: none;
        }
        canvas { display: block; }
        #ui-panel {
            position: absolute;
            top: 20px;
            left: 20px;
            background: rgba(30, 30, 30, 0.95);
            padding: 20px;
            border-radius: 14px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.6);
            border: 1px solid #3a3a3a;
            min-width: 270px;
            pointer-events: auto;
            z-index: 10;
        }
        h2 { margin: 0 0 18px 0; font-size: 1.25rem; color: #E0E0E0; text-align: center; border-bottom: 1px solid #444; padding-bottom: 10px; }
        
        /* Упрощенные стили текста */
        .stat { margin: 12px 0; font-size: 1.05rem; color: #CCC; }
        .val { font-weight: bold; color: #FFF; font-size: 1.1rem; }
        sub { font-size: 0.75em; }
        
        #flux-value {
            margin-top: 15px;
            padding: 12px;
            background: rgba(0,0,0,0.3);
            border-radius: 8px;
            text-align: center;
            font-size: 1.25rem;
            font-weight: bold;
            border: 1px solid #333;
        }
        .positive-flux { color: #FF7B7B; border-color: #FF7B7B !important; }
        .negative-flux { color: #5DA1FF; border-color: #5DA1FF !important; }
        .zero-flux { color: #A8DADC; border-color: #444 !important; }
        
        .btn-group {
            display: flex;
            gap: 12px;
            margin-top: 20px;
        }
        button {
            flex: 1;
            padding: 12px 5px;
            font-size: 1rem;
            font-weight: bold;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s;
            touch-action: manipulation;
        }
        button:hover { filter: brightness(1.1); transform: translateY(-1px); }
        button:active { filter: brightness(0.9); transform: translateY(1px); }
        #add-pos { background-color: #FF6B6B; box-shadow: 0 2px 5px rgba(255,107,107,0.3); }
        #add-neg { background-color: #4D96FF; box-shadow: 0 2px 5px rgba(77,150,255,0.3); }
        #clear-btn { background-color: #444; margin-top: 12px; width: 100%; color: #AAA; }
        #clear-btn:hover { background-color: #555; color: #FFF; }
        
        #instructions {
            position: absolute;
            bottom: 25px;
            width: 100%;
            text-align: center;
            color: #AAA;
            pointer-events: none;
            font-size: 1rem;
            z-index: 5;
            line-height: 1.5;
        }
        .instruction-note {
            font-size: 0.85rem;
            color: #666;
        }
    </style>
</head>
<body>

    <div id="ui-panel">
        <h2>Gauss's Law Simulator</h2>
        <div class="stat">Enclosed Charge (Q<sub>enc</sub>): <span id="inside-text" class="val">0 Q</span></div>
        <div class="stat">Electric Flux (Φ<sub>E</sub>):</div>
        <div id="flux-value" class="zero-flux">Φ<sub>E</sub> = 0</div>
        
        <div class="btn-group">
            <button id="add-pos">Add +Q</button>
            <button id="add-neg">Add -Q</button>
        </div>
        <button id="clear-btn">Clear All</button>
    </div>

    <div id="instructions">
        Drag charges inside or outside the surface.<br>
        <span class="instruction-note">Note: Flux depends ONLY on enclosed charges. Charges exactly on the boundary contribute Q/2.</span>
    </div>

    <canvas id="simCanvas"></canvas>

    <script>
        const canvas = document.getElementById('simCanvas');
        const ctx = canvas.getContext('2d');
        const insideText = document.getElementById('inside-text');
        const fluxValue = document.getElementById('flux-value');
        
        let width, height;
        let surfaceRadius = 150;
        const numLines = 12; 
        let animationOffset = 0;
        let charges = [];
        let draggingCharge = null;
        const boundaryTolerance = 16; 

        function resize() {
            width = window.innerWidth;
            height = window.innerHeight;
            canvas.width = width;
            canvas.height = height;
            surfaceRadius = Math.min(width, height) * 0.30; 
        }
        window.addEventListener('resize', resize);
        resize();

        document.getElementById('add-pos').addEventListener('click', () => {
            charges.push({ x: width/2 + (Math.random()*60-30), y: height/2 + (Math.random()*60-30), radius: 22, isPositive: true });
        });
        document.getElementById('add-neg').addEventListener('click', () => {
            charges.push({ x: width/2 + (Math.random()*60-30), y: height/2 + (Math.random()*60-30), radius: 22, isPositive: false });
        });
        document.getElementById('clear-btn').addEventListener('click', () => {
            charges = [];
        });

        charges.push({ x: width/2, y: height/2, radius: 22, isPositive: true });

        function startDrag(clientX, clientY) {
            for (let i = charges.length - 1; i >= 0; i--) {
                let c = charges[i];
                const dx = clientX - c.x;
                const dy = clientY - c.y;
                if(Math.sqrt(dx*dx + dy*dy) < c.radius * 2.5) { 
                    draggingCharge = c;
                    return;
                }
            }
        }
        function moveDrag(clientX, clientY) {
            if(draggingCharge) { draggingCharge.x = clientX; draggingCharge.y = clientY; }
        }
        function stopDrag() { draggingCharge = null; }

        canvas.addEventListener('mousedown', (e) => startDrag(e.clientX, e.clientY));
        window.addEventListener('mousemove', (e) => moveDrag(e.clientX, e.clientY));
        window.addEventListener('mouseup', stopDrag);
        canvas.addEventListener('touchstart', (e) => { e.preventDefault(); startDrag(e.touches[0].clientX, e.touches[0].clientY); }, { passive: false });
        window.addEventListener('touchmove', (e) => { if (draggingCharge) e.preventDefault(); moveDrag(e.touches[0].clientX, e.touches[0].clientY); }, { passive: false });
        window.addEventListener('touchend', stopDrag);

        function drawArrow(x, y, angle, color) {
            ctx.save(); ctx.translate(x, y); ctx.rotate(angle);
            ctx.beginPath(); ctx.moveTo(0, 0); ctx.lineTo(-12, 6); ctx.lineTo(-12, -6); ctx.closePath();
            ctx.fillStyle = color; ctx.fill(); ctx.restore();
        }

        function draw() {
            ctx.clearRect(0, 0, width, height);
            const centerX = width / 2;
            const centerY = height / 2;

            ctx.beginPath();
            ctx.arc(centerX, centerY, surfaceRadius, 0, Math.PI * 2);
            ctx.strokeStyle = '#555'; ctx.lineWidth = 3; ctx.setLineDash([10, 10]);
            ctx.stroke(); ctx.setLineDash([]);

            let netChargeInside = 0;
            animationOffset += 1.5; 
            if (animationOffset > 100) animationOffset = 0;

            charges.forEach(charge => {
                const distToCenter = Math.sqrt(Math.pow(charge.x - centerX, 2) + Math.pow(charge.y - centerY, 2));
                let isOnSurface = Math.abs(distToCenter - surfaceRadius) <= boundaryTolerance;
                let isInside = distToCenter < surfaceRadius && !isOnSurface;

                if (isOnSurface) netChargeInside += charge.isPositive ? 0.5 : -0.5;
                else if (isInside) netChargeInside += charge.isPositive ? 1 : -1;
                
                const lineColor = charge.isPositive ? '#FF7B7B' : '#5DA1FF';

                for(let i = 0; i < numLines; i++) {
                    const angle = (i * Math.PI * 2) / numLines;
                    const dir = { x: Math.cos(angle), y: Math.sin(angle) };
                    ctx.beginPath();
                    ctx.moveTo(charge.x, charge.y);
                    ctx.lineTo(charge.x + dir.x * 2000, charge.y + dir.y * 2000);
                    ctx.strokeStyle = `rgba(${charge.isPositive ? '255,123,123' : '93,161,255'}, 0.25)`;
                    ctx.lineWidth = 2; ctx.stroke();

                    for(let j = 0; j < 15; j++) {
                        let arrowDist = charge.isPositive ? (j * 100 + animationOffset) : (j * 100 + (100 - animationOffset));
                        if (arrowDist > 35) {
                            drawArrow(charge.x + dir.x * arrowDist, charge.y + dir.y * arrowDist, charge.isPositive ? angle : angle + Math.PI, lineColor);
                        }
                    }
                }
            });

            charges.forEach(charge => {
                const distToCenter = Math.sqrt(Math.pow(charge.x - centerX, 2) + Math.pow(charge.y - centerY, 2));
                let isOnSurface = Math.abs(distToCenter - surfaceRadius) <= boundaryTolerance;

                ctx.beginPath();
                ctx.arc(charge.x, charge.y, charge.radius, 0, Math.PI * 2);
                if (isOnSurface) { ctx.shadowBlur = 25; ctx.shadowColor = '#FFFFFF'; } 
                else { ctx.shadowBlur = 0; }

                ctx.fillStyle = charge.isPositive ? '#FF6B6B' : '#4D96FF';
                ctx.fill();
                ctx.strokeStyle = '#fff'; ctx.lineWidth = 3; ctx.stroke();
                ctx.shadowBlur = 0; 
                
                ctx.fillStyle = '#fff'; ctx.font = 'bold 24px Arial'; ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
                ctx.fillText(charge.isPositive ? '+' : '-', charge.x, charge.y + 2);
            });

            let chargeText = netChargeInside === 0 ? "0" : (netChargeInside > 0 ? "+" : "") + netChargeInside;
            insideText.textContent = chargeText + " Q";

            if (netChargeInside > 0) {
                fluxValue.innerHTML = `Φ<sub>E</sub> = +${netChargeInside}Q / ε₀`;
                fluxValue.className = "positive-flux";
            } else if (netChargeInside < 0) {
                fluxValue.innerHTML = `Φ<sub>E</sub> = ${netChargeInside}Q / ε₀`;
                fluxValue.className = "negative-flux";
            } else {
                fluxValue.innerHTML = "Φ<sub>E</sub> = 0";
                fluxValue.className = "zero-flux";
            }

            requestAnimationFrame(draw);
        }
        draw();
    </script>
</body>
</html>
